<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnHub — Courses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161b24; --surface2: #1c2233;
    --border: #252d3d; --accent: #5b7fff; --text: #e8eaf0;
    --muted: #6b7280; --success: #34d399; --error: #f87171;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-user { font-size: 14px; color: var(--muted); }
  .nav-user span { color: var(--text); font-weight: 500; }
  .btn-sm {
    padding: 8px 18px; border-radius: 8px; font-size: 13px;
    font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text);
    transition: all 0.2s;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }

  main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .page-header { margin-bottom: 32px; }
  .page-header h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-header p { color: var(--muted); font-size: 15px; }

  .filters {
    display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 400px; }
  .search-wrap input {
    width: 100%; padding: 10px 16px 10px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  .filter-btn {
    padding: 9px 18px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-category {
    display: inline-block;
    padding: 4px 12px; border-radius: 20px;
    background: rgba(91,127,255,0.12);
    color: var(--accent);
    font-size: 12px; font-weight: 500; margin-bottom: 14px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px; font-weight: 700; margin-bottom: 8px;
    line-height: 1.3;
  }
  .card-desc { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
  .card-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .card-instructor { font-size: 12px; color: var(--muted); }
  .card-instructor span { color: var(--text); font-weight: 500; }
  .card-price {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--accent);
  }
  .card-stats { display: flex; gap: 14px; margin-bottom: 14px; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); }

  .enroll-btn {
    width: 100%; margin-top: 14px; padding: 10px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s; display: none;
  }
  .enroll-btn:hover { opacity: 0.85; }
  .enrolled-badge {
    width: 100%; margin-top: 14px; padding: 10px;
    background: rgba(52,211,153,0.1); color: var(--success);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 10px; font-size: 13px; font-weight: 500;
    text-align: center; display: none;
  }

  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 40px;
  }
  .page-btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty {
    grid-column: 1/-1; text-align: center; padding: 80px 20px;
    color: var(--muted); font-size: 15px;
  }
  .loading { text-align: center; color: var(--muted); padding: 80px; font-size: 15px; }

  .toast-fixed {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 10px;
    font-size: 14px; z-index: 999;
    background: var(--surface); border: 1px solid var(--border);
    transform: translateY(80px); transition: transform 0.3s;
  }
  .toast-fixed.show { transform: translateY(0); }
  .toast-fixed.success { border-color: rgba(52,211,153,0.3); color: var(--success); }
  .toast-fixed.error { border-color: rgba(248,113,113,0.3); color: var(--error); }
</style>
</head>
<body>
<nav>
  <div class="logo">LearnHub</div>
  <div class="nav-right">
    <div class="nav-user" id="navUser"></div>
    <button class="btn-sm btn-primary" id="createBtn" style="display:none" onclick="window.location.href='create-course.html'">+ Create Course</button>
    <button class="btn-sm" onclick="logout()">Sign out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Browse Courses</h1>
    <p id="courseCount">Loading...</p>
  </div>

  <div class="filters">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search courses..." oninput="debounceSearch()">
    </div>
    <button class="filter-btn active" onclick="filterCategory(this, '')">All</button>
    <button class="filter-btn" onclick="filterCategory(this, 'Programming')">Programming</button>
    <button class="filter-btn" onclick="filterCategory(this, 'Design')">Design</button>
    <button class="filter-btn" onclick="filterCategory(this, 'Business')">Business</button>
    <button class="filter-btn" onclick="filterCategory(this, 'Data Science')">Data Science</button>
  </div>

  <div class="grid" id="grid"><div class="loading">Loading courses...</div></div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="toast-fixed" id="toast"></div>

<script>
  const API = 'http://localhost:5153/api/v1';
  let currentPage = 1;
  let currentSearch = '';
  let currentCategory = '';
  let searchTimer;
  let enrolledIds = new Set();

  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  const username = localStorage.getItem('username');

  // Show user info in nav
  if (username) {
    document.getElementById('navUser').innerHTML =
      `Hello, <span>${username}</span> <span style="color:var(--accent);font-size:12px;padding:2px 8px;background:rgba(91,127,255,0.12);border-radius:10px;margin-left:4px">${role}</span>`;
  }

  if (role === 'Instructor' || role === 'Admin') {
    document.getElementById('createBtn').style.display = 'block';
  }

  function getHeaders() {
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = `Bearer ${token}`;
    return h;
  }

  async function loadCourses(page = 1) {
    currentPage = page;
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading...</div>';

    try {
      let url = `${API}/courses?page=${page}&pageSize=9`;
      if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;

      const res = await fetch(url, { headers: getHeaders() });
      if (!res.ok) throw new Error('Failed to load courses');

      const data = await res.json();

      document.getElementById('courseCount').textContent =
        `${data.totalCount} course${data.totalCount !== 1 ? 's' : ''} available`;

      if (data.items.length === 0) {
        grid.innerHTML = '<div class="empty">No courses found. Try a different search.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      if (currentCategory) {
        await loadByCategory(currentCategory);
        return;
      }

      renderCourses(data.items);
      renderPagination(data.page, data.totalPages);

    } catch (err) {
      grid.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  async function loadByCategory(cat) {
    try {
      const res = await fetch(`${API}/courses/category/${encodeURIComponent(cat)}`,
        { headers: getHeaders() });
      const courses = await res.json();
      document.getElementById('courseCount').textContent =
        `${courses.length} course${courses.length !== 1 ? 's' : ''} in ${cat}`;
      renderCourses(courses);
      document.getElementById('pagination').innerHTML = '';
    } catch (err) {
      document.getElementById('grid').innerHTML = `<div class="empty">${err.message}</div>`;
    }
  }

  function renderCourses(courses) {
    const grid = document.getElementById('grid');
    grid.innerHTML = courses.map(c => `
      <div class="card">
        <div class="card-category">${c.category}</div>
        <div class="card-title">${c.title}</div>
        <div class="card-desc">${c.description || 'No description provided.'}</div>
        <div class="card-stats">
          <div class="stat"><strong>${c.lessonCount}</strong> lessons</div>
          <div class="stat"><strong>${c.enrollmentCount}</strong> students</div>
        </div>
        <div class="card-meta">
          <div class="card-instructor">By <span>${c.instructorName}</span></div>
          <div class="card-price">${c.price === 0 ? 'Free' : '$' + c.price.toFixed(2)}</div>
        </div>
        ${token && role === 'Student'
          ? enrolledIds.has(c.id)
            ? `<div class="enrolled-badge" style="display:block">✓ Enrolled</div>`
            : `<button class="enroll-btn" style="display:block" onclick="enroll(${c.id}, this)">Enroll Now</button>`
          : ''}
      </div>
    `).join('');
  }

  function renderPagination(page, total) {
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = `<button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="loadCourses(${page - 1})">← Prev</button>`;
    for (let i = 1; i <= total; i++) {
      html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadCourses(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" ${page === total ? 'disabled' : ''} onclick="loadCourses(${page + 1})">Next →</button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  async function enroll(courseId, btn) {
    if (!token) { showToast('Please log in to enroll', 'error'); return; }
    btn.disabled = true; btn.textContent = 'Enrolling...';
    try {
      const res = await fetch(`${API}/enroll`, {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ courseId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Enrollment failed');
      enrolledIds.add(courseId);
      btn.outerHTML = `<div class="enrolled-badge" style="display:block">✓ Enrolled</div>`;
      showToast('Successfully enrolled!', 'success');
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Enroll Now';
      showToast(err.message, 'error');
    }
  }

  function filterCategory(el, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCategory = cat;
    if (cat) loadByCategory(cat);
    else loadCourses(1);
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    currentSearch = document.getElementById('search').value;
    currentCategory = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
    searchTimer = setTimeout(() => loadCourses(1), 400);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast-fixed show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadCourses();
</script>
</body>
</html>
